  /x/tweets/search:
    get:
      operationId: searchTweets
      summary: Search tweets with X query operators & pagination
      tags:
        - Tweets
      security:
        - apiKey: []
        - oauthBearer: []
        - {}
      x-payment-info:
        protocols:
          - x402: {}
          - mpp:
              method: ''
              intent: session
              currency: ''
        price:
          mode: dynamic
          min: '0.00015'
          max: '0.03000'
          currency: USD
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (keywords, #hashtags, from:user, "exact phrases", since:YYYY-MM-DD, until:YYYY-MM-DD, min_faves:N)
        - name: queryType
          in: query
          required: false
          schema:
            type: string
            enum: [Latest, Top]
            default: Latest
          description:
            Sort order — Latest (chronological) or Top (engagement-ranked)
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor from previous response
        - name: sinceTime
          in: query
          schema:
            type: string
          description: ISO 8601 timestamp — only return tweets after this time
        - name: untilTime
          in: query
          schema:
            type: string
          description: ISO 8601 timestamp — only return tweets before this time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 200
          description:
            Max tweets to return (server paginates internally). Omit for single
            page (~20).
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTweets'
              example:
                tweets:
