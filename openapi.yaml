      operationId: lookupTweet
      summary: Get tweet with full text, author, metrics & media
      tags:
        - Tweets
      security:
        - apiKey: []
        - oauthBearer: []
        - {}
      x-payment-info:
        protocols:
          - x402: {}
          - mpp:
              method: ''
              intent: charge
              currency: ''
        price:
          mode: fixed
          amount: '0.00015'
          currency: USD
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Tweet ID
      responses:
        '200':
          description: Tweet with author
          content:
            application/json:
              schema:
                type: object
                required: [tweet]
                properties:
                  tweet:
                    $ref: '#/components/schemas/TweetDetail'
                  author:
                    $ref: '#/components/schemas/TweetAuthor'
              example:
                tweet:
                  id: '1234567890'
                  text: 'Just launched our new feature!'
                  createdAt: '2025-01-15T12:00:00Z'
                  retweetCount: 5
                  replyCount: 3
                  likeCount: 42
                  quoteCount: 1
                  viewCount: 1500
                  bookmarkCount: 2
                author:
                  id: '9876543210'
                  username: 'elonmusk'
                  followers: 150000000
                  verified: true
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '502':
          $ref: '#/components/responses/XApiError'
    delete:
      operationId: deleteTweet
      summary: Delete tweet
      tags: [X Write]
      security:
        - apiKey: []
        - oauthBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Tweet ID to delete
      requestBody:
        required: true
        description: Account that owns the tweet.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/XAccountBody'
            example:
              account: '@elonmusk'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/WriteError'

