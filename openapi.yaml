                    auto_topup_enabled,
                    auto_topup_threshold,
                    balance,
                    lifetime_purchased,
                    lifetime_used,
                  ]
                properties:
                  auto_topup_amount_dollars:
                    type: number
                    description:
                      Configured dollar amount for each automatic top-up.
                    example: 10
                  auto_topup_enabled:
                    type: boolean
                    example: false
                  auto_topup_threshold:
                    type: string
                    description:
                      Credit balance threshold that triggers automatic top-up
                      when enabled, represented as a bigint string.
                    example: '50000'
                  balance:
                    type: string
                    description:
                      Current credit balance as a bigint string to preserve
                      precision above Number.MAX_SAFE_INTEGER.
                    example: '50000'
                  lifetime_purchased:
                    type: string
                    description: Lifetime purchased credits as a bigint string.
                    example: '200000'
                  lifetime_used:
                    type: string
                    description: Lifetime consumed credits as a bigint string.
                    example: '150000'
              example:
                auto_topup_amount_dollars: 10
                auto_topup_enabled: false
                auto_topup_threshold: '50000'
                balance: '50000'
                lifetime_purchased: '200000'
                lifetime_used: '150000'
