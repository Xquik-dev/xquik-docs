              currency: ''
        price:
          mode: dynamic
          min: '0.00015'
          max: '0.01500'
          currency: USD
      requestBody:
        required: true
        description:
          Single tweet URL/ID or array of up to 50 tweet URLs/IDs for bulk
          download.
        content:
          application/json:
            schema:
              type: object
              properties:
                tweetInput:
                  type: string
                  description: Tweet URL or ID (single tweet)
                  example: 'https://x.com/elonmusk/status/1234567890'
                tweetIds:
                  type: array
                  items:
                    type: string
                  maxItems: 50
                  description: Array of tweet URLs or IDs (bulk, max 50)
                  example: ['1234567890', '1234567891']
            example:
              tweetInput: 'https://x.com/elonmusk/status/1234567890'
      responses:
        '200':
          description:
            'Media download result. Single: tweetId + galleryUrl + cacheHit.
            Bulk: galleryUrl + totalTweets + totalMedia.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  tweetId:
                    type: string
                    example: '1234567890'
                  galleryUrl:
                    type: string
                    example: 'https://xquik.com/gallery/abc123'
                  cacheHit:
                    type: boolean
                    example: false
                  totalTweets:
                    type: integer
                    example: 2
                  totalMedia:
                    type: integer
                    example: 5
              example:
                tweetId: '1234567890'
                galleryUrl: 'https://xquik.com/gallery/abc123'
                cacheHit: false
        '400':
