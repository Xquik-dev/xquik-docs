  # ── X API (reads) ────────────────────────────────────────
  /x/tweets:
    get:
      operationId: getBatchTweets
      summary: Get multiple tweets by IDs
      tags:
        - Tweets
      security:
        - apiKey: []
        - oauthBearer: []
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated tweet IDs (max 100)
      responses:
        '200':
          description: List of tweets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTweets'
              example:
                tweets:
                  - id: '1234567890'
                    text: 'Just launched our new feature!'
                    createdAt: '2025-01-15T12:00:00Z'
                    likeCount: 42
                    retweetCount: 5
                    replyCount: 3
                    quoteCount: 1
                    viewCount: 1500
                    bookmarkCount: 2
                    author:
                      id: '9876543210'
                      username: 'elonmusk'
                      name: 'Elon Musk'
                      verified: true
                has_next_page: true
                next_cursor: 'DAACCgACGRElMJcAAA'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    post:
      operationId: createTweet
      summary: Create tweet
      tags: [X Write]
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: true
        description: Account and tweet content. Requires text, media, or both.
        content:
          application/json:
            schema:
              type: object
              required: [account]
              properties:
                account:
                  type: string
                  description: X account (@username or account ID)
                  example: '@elonmusk'
                text:
                  type: string
                  description: Tweet text (optional when media is provided)
                  example: 'Just launched our new feature!'
                reply_to_tweet_id:
                  type: string
                  example: '1234567890'
                attachment_url:
                  type: string
                  example: 'https://x.com/elonmusk/status/1234567890'
                community_id:
                  type: string
                  example: '1500000000000000000'
                is_note_tweet:
                  type: boolean
                  example: false
                media:
                  type: array
                  items:
                    type: string
                  maxItems: 4
                  description:
                    Array of public image URLs to attach (max 4). Each URL must
                    be publicly reachable - the browser composer fetches them
                    directly.
                  example: ['https://example.com/image.jpg']
            example:
              account: '@elonmusk'
              text: 'Just launched our new feature!'
      responses:
        '200':
          description: Tweet created
          content:
            application/json:
              schema:
                type: object
                required: [tweetId, success]
                properties:
                  tweetId:
                    type: string
                    example: '1234567890'
                  success:
                    type: boolean
                    const: true
                    example: true
              example:
                tweetId: '1234567890'
                success: true
        '400':
          description: Invalid input or unsupported field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                InvalidInput:
                  summary: Invalid input
                  value:
                    error: invalid_input
                    message: Either text or media is required
                UnsupportedField:
                  summary: Unsupported field on POST /x/tweets
                  value:
                    error: unsupported_field
                    message:
                      media_ids is not supported on POST /x/tweets. Pass media
                      as an array of public image URLs.
                    retryable: false
                    details:
                      action: create_tweet
                      suggestion:
                        Use the media field with public image URLs instead of
                        media_ids.
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '403':
          $ref: '#/components/responses/AccountAuthError'
        '422':
          $ref: '#/components/responses/WriteRejected'
        '429':
