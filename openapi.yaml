components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
      description:
        API key passed via the x-api-key header. Xquik-Api-Key is accepted as a
        non-breaking vendor-prefixed alias.
    oauthBearer:
      type: http
      scheme: bearer
      description: OAuth 2.1 access token

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID (stringified bigint)
    Limit:
      name: limit
      in: query
      description: >
        Maximum number of items to return (1-100, default 50). For paid
        per-result endpoints, the returned count may be lower when remaining
        credits cannot cover the requested page. If zero paid results are
        affordable, the endpoint returns 402 insufficient_credits.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    After:
      name: cursor
      in: query
      schema:
        type: string
      description: Cursor for keyset pagination from prior response next_cursor
    StyleId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Style profile ID or X username

  responses:
    Success:
      description: Success
      content:
        application/json:
          schema:
            type: object
            required: [success]
            properties:
              success:
                type: boolean
                const: true
                example: true
          example:
            success: true
    NoContent:
      description: Deleted
    Unauthenticated:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'unauthenticated'
            message:
              'Authentication required. Provide a valid API key or bearer token.'
    InvalidInput:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'invalid_input'
            message: 'Invalid input. Check the request body.'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'not_found'
            message: 'Resource not found.'
    PaymentRequired:
      description:
        Payment required. Returns a WWW-Authenticate header with an MPP
        challenge for pay-per-use endpoints, or indicates a subscription/credit
        issue for identity-authenticated endpoints.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'insufficient_credits'
            message: 'Insufficient credits'
    AccountAuthError:
      description: >
        The connected X account needs reauthentication or is currently
        restricted (locked, suspended, or recovering). Returns an error code of
        `account_needs_reauth` or `account_restricted`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'account_needs_reauth'
            message: 'X account needs re-authentication. Re-add the account.'
    WriteError:
      description: >
        Write operation failed. Possible error codes include x_write_failed,
        x_write_ambiguous, x_duplicate_action, x_daily_limit (429 - account
        reached daily posting limit, wait 24 hours), and x_write_unconfirmed
        (202 - action may have completed but could not be confirmed, verify
        before retrying).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'x_write_failed'
            message:
              'Write action failed unexpectedly. Contact support if this
              persists.'
    WriteRejected:
      description: >
        X rejected the write or the media URL could not be downloaded. Possible
        codes: `x_content_too_long`, `x_duplicate_action`,
        `x_account_suspended`, `x_account_protected`, `x_target_not_found`,
        `x_account_feature_required`, `x_rejected`, `media_download_failed` (URL
        fetch path only - body.url not HTTPS, resolves to private IP, file too
        large, origin error, or timeout).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'x_rejected'
            message:
              'X rejected this request. Wait a few minutes and try again.'
    RateLimitedByX:
      description: >
        X throttled the write. Possible codes: `x_rate_limited` (short-term
        throttle) or `x_daily_limit` (daily cap hit). Back off and retry later.
        Distinct from Xquik tier-based 429.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'x_rate_limited'
            message: 'Rate limited by X. Wait before retrying.'
    TransientError:
      description: >
        A transient upstream issue occurred. Safe to retry with exponential
        backoff. Returns error code `x_transient_error`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'x_transient_error'
            message: 'X is temporarily unavailable. Retry after a short delay.'
    XApiError:
      description: >
        Dependency unavailable, unauthorized, or rate limited. Default v1
        returns 502. The best-practice response contract returns 424 for
        transparent dependency failures.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'x_api_unavailable'
            message: 'X data source temporarily unavailable. Try again later.'
    ConnectAlreadyConnected:
      description: >
        The specified X account is already connected to this Xquik account.
        Returns error code `account_already_connected`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'account_already_connected'
            message: 'This X account is already connected.'
    ConnectLoginFailed:
      description: >
        Could not authenticate with X. The provided credentials (username,
        password, or TOTP secret) were rejected. Returns error code
        `login_failed`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'login_failed'
            message: 'Login failed. Check credentials and try again.'
    ConnectLoginCooldown:
      description: >
        A prior login attempt triggered a cooldown. Response includes `reason`,
        `retry_after_ms`, and a `Retry-After` header in seconds. Returns error
        code `login_cooldown`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'login_cooldown'
            message: 'Login is temporarily rate limited. Retry later.'
    ConnectRateLimitExceeded:
      description: >
        Too many requests. Either the connection rate limit was exceeded
        (`rate_limit_exceeded` - 3 attempts per 15 minutes, `retryAfter`
        seconds, `Retry-After: 900` header) or a prior login attempt triggered a
        cooldown (`login_cooldown`, `reason`, `retryAfterMs`, `Retry-After`
        header in seconds).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'rate_limit_exceeded'
            message: 'Too many requests. Retry later.'
    RateLimitExceeded:
      description: >
        Xquik tier rate limit exceeded. The response includes a `Retry-After`
        header with the number of seconds to wait before retrying.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  retryAfter:
                    type: integer
                    example: 60
          example:
            error: 'rate_limit_exceeded'
            message: 'Too many requests. Try again later.'
            retryAfter: 60
    ConnectUserLookupFailed:
      description: >
        The X username could not be resolved. Verify the handle is correct and
        the account exists. Default v1 returns 502. The best-practice response
        contract returns 424. Error code: `x_user_lookup_failed`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'x_user_lookup_failed'
            message: 'X username lookup failed. Try again later.'
    ConnectServiceUnavailable:
      description: >
        The X connection service is temporarily unavailable. Retry after a short
        delay. Returns error code `service_unavailable`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'service_unavailable'
            message: 'Service temporarily unavailable. Try again later.'
    ReauthAccountNotFound:
      description: >
        No X account with this ID belongs to the authenticated user. Returns
        error code `account_not_found`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 'account_not_found'
            message: 'X account not found.'

  schemas:
    PaginatedTweets:
      description: >
