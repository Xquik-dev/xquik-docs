                targetTweetId:
                  type: string
                  example: '1234567890'
                targetUsername:
                  type: string
                  example: elonmusk
                targetCommunityId:
                  type: string
                  example: '1500000000000000000'
                targetListId:
                  type: string
                  example: '1234567890'
                targetSpaceId:
                  type: string
                  example: '1vOGwMdBqpwGB'
                searchQuery:
                  type: string
                  example: 'AI trends 2025'
                exactPhrase:
                  type: string
