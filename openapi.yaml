  /x/trends:
    get:
      operationId: getXTrends
      summary: Get trending hashtags and topics from X by region
      tags:
        - Trends
      security:
        - apiKey: []
        - oauthBearer: []
        - {}
      x-payment-info:
        amount: '450'
        currency: '0x20c000000000000000000000b9537d11c60e8b50'
        intent: charge
        method: tempo
      parameters:
        - name: woeid
          in: query
          schema:
            type: integer
            default: 1
          description:
            'Region WOEID (1=Worldwide, 23424977=US, 23424975=UK,
            23424969=Turkey)'
        - name: count
          in: query
          description: Number of trending topics to return (1-50, default 30)
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: List of trending topics
          content:
            application/json:
              schema:
                type: object
                required: [trends, count, woeid]
                properties:
                  trends:
                    type: array
                    items:
                      type: object
                      required: [name]
                      properties:
                        name:
                          type: string
                          example: '#AI'
                        description:
                          type: string
                          example: 'Artificial intelligence discussions'
                        query:
                          type: string
                          example: '%23AI'
                        rank:
                          type: integer
                          example: 1
                    example:
                      - name: '#AI'
                        description: 'Artificial intelligence discussions'
                        query: '%23AI'
                        rank: 1
                  count:
                    type: integer
                    example: 30
                  woeid:
                    type: integer
                    example: 1
              example:
                trends:
                  - name: '#AI'
                    description: 'Artificial intelligence discussions'
                    query: '%23AI'
                    rank: 1
                count: 30
                woeid: 1
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'

  /x/tweets/search:
    get:
      operationId: searchTweets
      summary: Search tweets with X query operators and pagination
      tags:
        - Tweets
      security:
        - apiKey: []
        - oauthBearer: []
        - {}
      x-payment-info:
        amount: '150'
        currency: '0x20c000000000000000000000b9537d11c60e8b50'
        intent: session
        method: tempo
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (keywords, #hashtags, from:user, "exact phrases", since:YYYY-MM-DD, until:YYYY-MM-DD, min_faves:N)
        - name: queryType
          in: query
          required: false
          schema:
            type: string
            enum: [Latest, Top]
            default: Latest
          description:
            Sort order - Latest (chronological) or Top (engagement-ranked)
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor from previous response
        - name: sinceTime
          in: query
          schema:
            type: string
          description: ISO 8601 timestamp - only return tweets after this time
        - name: untilTime
          in: query
          schema:
            type: string
          description: ISO 8601 timestamp - only return tweets before this time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 200
          description: >
            Max tweets to return (server paginates internally). Omit for single
            page (~20). This is an upper bound for paid authenticated calls:
            remaining credits can reduce the returned page size, and zero
            affordable results returns 402 insufficient_credits.
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTweets'
              example:
                tweets:
                  - id: '1234567890'
                    text: 'Just launched our new feature!'
                    createdAt: '2025-01-15T12:00:00Z'
                    likeCount: 42
                    retweetCount: 5
                    replyCount: 3
                    quoteCount: 1
                    viewCount: 1500
                    bookmarkCount: 2
                    author:
                      id: '9876543210'
                      username: 'elonmusk'
                      name: 'Elon Musk'
                      verified: true
                has_next_page: true
                next_cursor: 'DAACCgACGRElMJcAAA'
        '400':
          description: Missing query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'missing_query'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '502':
          $ref: '#/components/responses/XApiError'
        '424':
          $ref: '#/components/responses/XApiError'

  /x/articles/{tweetId}:
    get:
      operationId: getArticle
      summary: Get full X Article content with cover image and metadata
      description:
        Retrieve the full content of an X Article (long-form post) by numeric
        tweet ID. Returns article_not_found when the tweet is valid but is not
        an X Article.
      tags:
        - Articles
      security:
        - apiKey: []
        - oauthBearer: []
        - {}
      x-payment-info:
        amount: '1050'
        currency: '0x20c000000000000000000000b9537d11c60e8b50'
        intent: charge
        method: tempo
      parameters:
        - name: tweetId
          in: path
          required: true
          schema:
            type: string
          description:
            Numeric tweet ID of the article, 15-20 digits. If you have a tweet
            URL, use the final status ID.
      responses:
        '200':
          description: Article with author
          content:
            application/json:
              schema:
                type: object
                required: [article]
                properties:
                  article:
                    type: object
                    properties:
                      title:
                        type: string
                        example: 'The Future of AI'
                      previewText:
                        type: string
                        example: 'A deep dive into the latest AI trends...'
                      coverImageUrl:
                        type: string
                        example: 'https://pbs.twimg.com/media/example.jpg'
                      contents:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              description:
                                'Block type: unstyled, header-one, header-two,
                                header-three, unordered-list-item,
                                ordered-list-item, image, gif, divider'
                              example: 'unstyled'
                            text:
                              type: string
                              example:
                                'This is the first paragraph of the article.'
                            url:
                              type: string
                              description: Media URL for image/gif blocks
                              example: 'https://pbs.twimg.com/media/example.jpg'
                            width:
                              type: integer
                              example: 1200
                            height:
                              type: integer
                              example: 675
                      createdAt:
                        type: string
                        example: '2025-01-15T12:00:00Z'
                      likeCount:
                        type: integer
                        example: 150
                      replyCount:
                        type: integer
                        example: 23
                      quoteCount:
                        type: integer
                        example: 8
                      viewCount:
                        type: integer
                        example: 5000
                  author:
                    $ref: '#/components/schemas/TweetAuthor'
              example:
                article:
                  title: 'The Future of AI'
                  previewText: 'A deep dive into the latest AI trends...'
                  coverImageUrl: 'https://pbs.twimg.com/media/example.jpg'
                  contents:
                    - type: 'unstyled'
                      text: 'This is the first paragraph of the article.'
                  createdAt: '2025-01-15T12:00:00Z'
                  likeCount: 150
                  replyCount: 23
                  quoteCount: 8
                  viewCount: 5000
                author:
                  id: '9876543210'
                  username: 'elonmusk'
                  followers: 150000000
                  verified: true
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: Article not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'article_not_found'
                message: 'Article not found. Use an X Article tweet ID.'
        '502':
          $ref: '#/components/responses/XApiError'
        '424':
          $ref: '#/components/responses/XApiError'

