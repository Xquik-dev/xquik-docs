          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'

    DraftDetail:
      description: Full tweet draft including update timestamp.
      type: object
      required: [id, text, createdAt, updatedAt]
      properties:
        id:
          type: string
          example: '42'
        text:
          type: string
          example: 'Draft tweet about AI trends'
        topic:
          type: string
          example: 'Technology'
        goal:
          type: string
          example: 'Engagement'
        createdAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2025-01-16T09:30:00Z'

    StyleProfileSummary:
      description: Style profile summary with tweet count and ownership flag.
      type: object
      required: [xUsername, tweetCount, isOwnAccount, fetchedAt]
      properties:
        xUsername:
          type: string
          example: 'elonmusk'
        tweetCount:
          type: integer
          example: 50
        isOwnAccount:
          type: boolean
          example: true
        fetchedAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'

    StyleProfile:
      description:
        Full style profile with sampled tweets used for tone analysis.
      type: object
      required: [xUsername, tweetCount, isOwnAccount, fetchedAt, tweets]
      properties:
        xUsername:
          type: string
          example: 'elonmusk'
        tweetCount:
          type: integer
          example: 50
        isOwnAccount:
          type: boolean
          example: true
        fetchedAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'
        tweets:
          type: array
          items:
            type: object
            required: [id, text]
            properties:
              id:
                type: string
                example: '1234567890'
              text:
                type: string
                example: 'Just launched our new feature!'
              createdAt:
                type: string
                example: '2025-01-15T12:00:00Z'
              authorUsername:
                type: string
                example: 'elonmusk'
          example:
            - id: '1234567890'
              text: 'Just launched our new feature!'

    RadarItem:
      description:
        Trending topic with score, category, source, region, language, and
        source-specific metadata.
      type: object
      required:
        - id
        - sourceId
        - title
        - score
        - category
        - source
        - region
        - language
        - metadata
        - publishedAt
        - createdAt
      properties:
        id:
          type: string
          description: Internal numeric identifier (stringified bigint).
          example: '4712'
        sourceId:
          type: string
          description: Source-specific identifier used for deduplication.
          example: 'trustmrr_acme'
        title:
          type: string
          example: 'AI Revolution in 2025'
        url:
          type: string
          example: 'https://example.com/article/ai-revolution'
        score:
          type: number
          example: 95.5
        category:
          type: string
          enum:
            [
              general,
              tech,
              dev,
              science,
              culture,
              politics,
              business,
              entertainment,
            ]
          example: 'tech'
        source:
          type: string
          enum:
            [
              github,
              google_trends,
              hacker_news,
              polymarket,
              reddit,
              trustmrr,
              wikipedia,
            ]
          example: 'trustmrr'
        region:
          type: string
          example: 'global'
        language:
          type: string
          example: 'en'
        metadata:
          type: object
          description: |
            Source-specific fields. Shape varies per source:
            - reddit: { subreddit: string, author: string }
            - github: { starsToday: number }
            - hacker_news: { points: number, numberComments: number }
            - google_trends: { approxTraffic: number }
            - polymarket: { volume24hr: number }
            - wikipedia: { views: number }
            - trustmrr: { mrr, growthPercent, last30Days, total, customers, activeSubscriptions, onSale, xHandle?, category?, askingPrice?, country?, growthMrrPercent?, multiple?, paymentProvider?, rank? }
          additionalProperties: true
        publishedAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'
        createdAt:
          type: string
          format: date-time
          example: '2025-01-15T12:01:00Z'
        description:
          type: string
          example: 'AI is transforming every industry'
        imageUrl:
          type: string
          example: 'https://example.com/images/ai.jpg'

    XAccount:
      description: Linked X account summary with username and connection status.
      type: object
      required: [id, xUserId, xUsername, status, health, createdAt]
      properties:
        id:
          type: string
          example: '42'
        xUserId:
          type: string
          example: '9876543210'
        xUsername:
          type: string
          example: 'elonmusk'
        status:
          type: string
          example: 'active'
        health:
          type: string
          description: >
            Derived login/cookie health. `healthy` = cookies valid.
            `needsReauth` = user must submit fresh credentials. `locked` = X
            locked the account; unlock on x.com first. `suspended` = X banned
            the account. `recovering` = past cooldown, will auto-retry on next
            use. `temporaryIssue` = transient backend problem; retry shortly.
          enum:
            [
              healthy,
              locked,
              needsReauth,
              recovering,
              suspended,
              temporaryIssue,
            ]
          example: 'healthy'
        createdAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'

    XAccountDetail:
      description:
        Full X account details including proxy, cookies, and update timestamp.
      type: object
      required: [id, xUserId, xUsername, status, health, createdAt]
      properties:
        id:
          type: string
          example: '42'
        xUserId:
          type: string
          example: '9876543210'
        xUsername:
          type: string
          example: 'elonmusk'
        status:
          type: string
          example: 'active'
        health:
          type: string
          enum:
            [
              healthy,
              locked,
              needsReauth,
              recovering,
              suspended,
              temporaryIssue,
            ]
          example: 'healthy'
        createdAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2025-03-10T08:30:00Z'
        proxyCountry:
          type: string
          example: 'US'
        cookiesObtainedAt:
          type: string
          format: date-time
          example: '2025-03-10T08:30:00Z'

    SanitizedXAccount:
      description: >
        Sanitized X account summary returned by connect and reauth. Includes an
        optional `loginCountry` field surfaced only when the declared proxy
        region had no browser-service capacity and the login used a single US
        browser session for this one-time action. Future activity continues to
        use the selected `proxy_country`; the field is omitted on normal logins.
      type: object
      required: [id, xUserId, xUsername, status, health, createdAt]
      properties:
        id:
          type: string
          example: '42'
        xUserId:
          type: string
          example: '9876543210'
        xUsername:
          type: string
          example: 'elonmusk'
        status:
          type: string
          example: 'active'
        health:
          type: string
          enum:
            [
              healthy,
              locked,
              needsReauth,
              recovering,
              suspended,
              temporaryIssue,
            ]
          example: 'healthy'
        createdAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'
        loginCountry:
          type: string
          description: >
            ISO-3166-1 alpha-2 country code used for this login. Present only
            when a one-time US fallback was triggered because the declared
            region was unavailable. Omitted otherwise.
          example: 'US'

    XAccountBody:
      description: Request body identifying an X account by username or ID.
      type: object
      required: [account]
      properties:
        account:
          type: string
          description: X account identifier (@username or account ID)
          example: '@elonmusk'

    CommunityActionResult:
      description: Result of a community join or leave action.
      type: object
      required: [communityId, communityName, success]
      properties:
        communityId:
          type: string
          example: '1500000000000000000'
        communityName:
          type: string
          example: 'Tesla Fans'
        success:
          type: boolean
          const: true
          example: true
