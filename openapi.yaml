        content:
          application/json:
            schema:
              type: object
              required: [toolType]
              properties:
                toolType:
                  $ref: '#/components/schemas/ExtractionToolType'
                  example: follower_explorer
                targetTweetId:
                  type: string
                  example: '1234567890'
                targetUsername:
                  type: string
                  example: elonmusk
                targetCommunityId:
                  type: string
                  example: '1500000000000000000'
                targetListId:
                  type: string
                  example: '1234567890'
                targetSpaceId:
                  type: string
                  example: '1vOGwMdBqpwGB'
                searchQuery:
                  type: string
                  example: 'AI trends 2025'
                exactPhrase:
                  type: string
                  description: Exact phrase to match (tweet_search_extractor)
                  example: 'artificial intelligence'
                excludeWords:
                  type: string
                  description:
                    Words to exclude from results (tweet_search_extractor)
                  example: 'spam'
                advancedQuery:
                  type: string
                  description:
