      operationId: createTweet
      summary: Create tweet
      tags: [X Write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, text]
              properties:
                account:
                  type: string
                  description: X account (@username or account ID)
                text:
                  type: string
                reply_to_tweet_id:
                  type: string
                attachment_url:
                  type: string
                community_id:
                  type: string
                is_note_tweet:
                  type: boolean
