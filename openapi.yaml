  /trends:
    get:
      operationId: getTrends
      summary: Get trending topics
      tags: [Trends]
      x-payment-info:
        protocols: [mpp]
        pricingMode: fixed
        price: "900"
      parameters:
        - name: woeid
          in: query
          schema:
            type: integer
            default: 1
          description: "Region WOEID (1=Worldwide, 23424977=US, 23424975=UK, 23424969=Turkey)"
        - name: count
          in: query
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Trending topics
          content:
            application/json:
              schema:
                type: object
                required: [trends, total, woeid]
                properties:
                  trends:
                    type: array
                    items:
                      type: object
                      required: [name]
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        query:
                          type: string
                        rank:
                          type: integer
                  total:
                    type: integer
                  woeid:
                    type: integer
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "402":
          $ref: "#/components/responses/PaymentRequired"
