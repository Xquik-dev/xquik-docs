          description: Target user ID
        - name: account
          in: query
          required: true
          schema:
            type: string
          description: >
            X handle (without the `@` prefix) of the connected X account whose
            session reads the conversation. The account must be a participant in
            the conversation - DM history cannot be routed through the shared
            read pool.
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor for DM history
        - name: maxId
          in: query
          schema:
            type: string
          description: Legacy pagination cursor (backward compat)
      responses:
        '200':
          description: List of DM messages
          content:
            application/json:
              schema:
                type: object
                required: [messages, has_next_page, next_cursor]
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                      required: [id]
                      properties:
                        id:
                          type: string
                          example: '1234567890123456789'
                        text:
                          type: string
                          example: 'Hey, how are you?'
                        senderId:
                          type: string
                          example: '9876543210'
                        receiverId:
                          type: string
                          example: '1234567890'
                        createdAt:
                          type: string
                          example: '2025-01-15T12:00:00Z'
                        mediaUrl:
                          type: string
                          example: 'https://pbs.twimg.com/dm_media/abc.jpg'
                          description: >
                            URL of attached media (image, GIF, or video).
                            Omitted when the message has no media attachment.
                    example:
                      - id: '1234567890123456789'
                        text: 'Hey, how are you?'
                        senderId: '9876543210'
                  has_next_page:
                    type: boolean
                    example: true
                  next_cursor:
                    type: string
                    example: 'DAACCgACGRElMJcAAA'
              example:
                messages:
                  - id: '1234567890123456789'
                    text: 'Hey, how are you?'
                    senderId: '9876543210'
                has_next_page: true
                next_cursor: 'DAACCgACGRElMJcAAA'
                senderId: '42'
                receiverId: '42'
                createdAt: 'createdAt_value'
        '400':
          description: >
            Invalid input. Either `invalid_user_id` (path user ID is empty or
            invalid) or `account_required` (the `account` query parameter was
            missing or empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidUserId:
                  summary: Invalid user ID
                  value:
                    error: invalid_user_id
                accountRequired:
                  summary: Account query parameter missing
                  value:
                    error: account_required
                    message: >-
                      Provide an account query parameter naming a connected X
                      account. DM history requires a participant session.
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '403':
          description: >
            DM read forbidden. Either the connected account is not a participant
            in this conversation (`dm_not_permitted`), the account is suspended,
            locked, or otherwise restricted (`account_restricted`), or the
            account session needs to be re-authenticated
            (`account_needs_reauth`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                dmNotPermitted:
                  summary: Account is not a conversation participant
                  value:
                    error: dm_not_permitted
                    message: >-
                      X rejected the DM read. The connected account is not a
                      participant in this conversation, or its session expired.
                      Reconnect the account on the dashboard and try again.
                accountRestricted:
                  summary: Connected account is restricted
                  value:
                    error: account_restricted
                accountNeedsReauth:
                  summary: Connected account needs reauthentication
                  value:
                    error: account_needs_reauth
        '502':
          $ref: '#/components/responses/XApiError'
        '424':
          $ref: '#/components/responses/XApiError'

  /x/communities/{id}/info:
