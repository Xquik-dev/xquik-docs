openapi: 3.1.0
info:
  title: Xquik API
  version: '1.0'
  description: >-
    Look up any tweet, user, or trend on X. Search tweets, check follower
    relationships, download media, and monitor accounts in real time. 32
    pay-per-use read endpoints work without a subscription - just pay per call.
    Write endpoints (post, like, retweet, follow, DM) and automation endpoints
    (bulk extractions, giveaway draws, monitors, webhooks) require an API key or
    OAuth 2.1 bearer token.


    ## Official SDKs


    All SDKs are auto-generated from this OpenAPI spec via Stainless and stay in
    sync release-by-release. Pick your language:


    - TypeScript / Node.js: `npm i x-twitter-scraper` -
      [Xquik-dev/x-twitter-scraper-typescript](https://github.com/Xquik-dev/x-twitter-scraper-typescript)

    - Python: `pip install x-twitter-scraper` -
      [Xquik-dev/x-twitter-scraper-python](https://github.com/Xquik-dev/x-twitter-scraper-python)

    - Go: `go get github.com/Xquik-dev/x-twitter-scraper-go` -
      [Xquik-dev/x-twitter-scraper-go](https://github.com/Xquik-dev/x-twitter-scraper-go)

    - Ruby: `gem install x-twitter-scraper` -
      [Xquik-dev/x-twitter-scraper-ruby](https://github.com/Xquik-dev/x-twitter-scraper-ruby)

    - Java (source build; Maven Central pending) -
      [Xquik-dev/x-twitter-scraper-java](https://github.com/Xquik-dev/x-twitter-scraper-java)

    - Kotlin (source build; Maven Central pending) -
      [Xquik-dev/x-twitter-scraper-kotlin](https://github.com/Xquik-dev/x-twitter-scraper-kotlin)

    - C# / .NET: `dotnet add package XTwitterScraper` -
      [Xquik-dev/x-twitter-scraper-csharp](https://github.com/Xquik-dev/x-twitter-scraper-csharp)

    - PHP: `composer require xquik/x-twitter-scraper` -
      [Xquik-dev/x-twitter-scraper-php](https://github.com/Xquik-dev/x-twitter-scraper-php)

    - CLI: `npm i -g x-twitter-scraper-cli` -
      [Xquik-dev/x-twitter-scraper-cli](https://github.com/Xquik-dev/x-twitter-scraper-cli)

    - Terraform Provider (Terraform Registry) -
      [Xquik-dev/terraform-provider-x-twitter-scraper](https://github.com/Xquik-dev/terraform-provider-x-twitter-scraper)


    OpenClaw plugin:
    [Xquik-dev/tweetclaw](https://github.com/Xquik-dev/tweetclaw) (`claw install
    tweetclaw`).
  x-guidance: >-
    ## Common tasks


    **Find a tweet** - GET /x/tweets/{id} with a numeric tweet ID. Returns full
    tweet data: text, author, metrics (likes, retweets, replies, views), media
    URLs, and creation timestamp. Cost: $0.00015 per lookup.


    **Search tweets** - GET /x/tweets/search?q={query}&limit={n}. Supports X
    search operators (from:, to:, has:media, min_faves:, lang:). Returns up to
    200 tweets per page with cursor-based pagination. Cost: $0.00015 per tweet
    returned.


    **Find a user** - GET /x/users/{id} where {id} is a numeric user ID or
    @username. Returns profile data: name, bio, follower/following counts,
    verification status, join date. Cost: $0.00015 per lookup.


    **Check if A follows B** - GET /x/followers/check?source={a}&target={b}
    where source and target are user IDs or @usernames. Cost: $0.00105.


    **Get trending topics** - GET /trends?woeid={region}&count={n}. WOEID 1 =
    worldwide, 23424977 = US, 23424975 = UK, 23424969 = Turkey. Cost: $0.00045.


    **Download media** - POST /x/media/download with {"tweetIds": ["123",
    "456"]} body. Returns download URLs for images and videos. Cost: $0.00015
    per media item.


    **Read an article** - GET /x/articles/{tweetId} for long-form X Articles.
    Returns full article HTML, cover image, and metadata. Cost: $0.00105.


    ## Pagination


    Default v1 responses keep their existing pagination fields for
    compatibility. Platform list endpoints return `hasMore` and `nextCursor`; X
    data endpoints return `has_next_page` and `next_cursor`. Send
    `xquik-api-contract: 2026-04-29` to receive the unified best-practice fields
    `has_more` and `next_cursor`. Pass the cursor back as `?cursor={cursor}`;
    legacy `?after={cursor}` still works. Dynamic-priced endpoints charge per
    item returned, not per request.


    ## Authentication


    Read-only paid endpoints accept pay-per-use payments (no account needed).
    Write endpoints and automation features require an `x-api-key` header or
    OAuth 2.1 bearer token.


    ## Best-Practice Response Contract


    v1 keeps its original response contract by default so existing integrations
    do not break. Send `xquik-api-contract: 2026-04-29` to opt in to the
    best-practice contract: snake_case response fields, Unix timestamps in
    seconds, structured error objects, `has_more` and `next_cursor` pagination
    fields, `object` resource identifiers, and prefixed IDs where available.
    Dependency failures that returned 502 in default v1 return 424 in the opt-in
    contract. Future major API versions should make this contract the default.
  contact:
    name: Xquik
    url: https://xquik.com
    email: support@xquik.com

servers:
  - url: https://xquik.com/api/v1

x-service-info:
  categories:
    - data
  docs:
    homepage: https://xquik.com
    apiReference: https://docs.xquik.com
    llms: https://docs.xquik.com/llms.txt

