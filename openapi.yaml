                properties:
                  id:
                    type: string
                    example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
                  toolType:
                    $ref: '#/components/schemas/ExtractionToolType'
                    example: follower_explorer
                  status:
                    type: string
                    const: running
                    example: running
