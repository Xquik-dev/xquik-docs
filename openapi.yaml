  /radar:
    get:
      operationId: getRadar
      summary: Get trending topics from curated sources
      tags: [Composition]
      security:
        - apiKey: []
        - oauthBearer: []
      parameters:
        - name: after
          in: query
          schema:
            type: string
          description: Cursor for pagination (from prior response nextCursor).
        - name: category
          in: query
          schema:
            type: string
            enum:
              [
                general,
                tech,
                dev,
                science,
                culture,
                politics,
                business,
                entertainment,
              ]
          description: Filter by category.
        - name: hours
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 24
          description: Lookback window in hours (1-168, default 24).
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Number of items to return (1-100, default 50).
        - name: region
          in: query
          schema:
            type: string
          description: 'Region filter (us, global, etc.)'
        - name: source
          in: query
          schema:
            type: string
            enum:
              [
                github,
                google_trends,
                hacker_news,
                polymarket,
                reddit,
                trustmrr,
                wikipedia,
              ]
          description:
            'Source filter. One of: github, google_trends, hacker_news,
            polymarket, reddit, trustmrr, wikipedia'
      responses:
        '200':
          description: Radar items
          content:
            application/json:
              schema:
                type: object
                required: [hasMore, items]
                properties:
                  hasMore:
                    type: boolean
                    example: false
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RadarItem'
                    example: []
                  nextCursor:
                    type: string
                    description:
                      Opaque cursor for the next page (present only when hasMore
                      is true).
                    example: 'eyJ0IjoxNzM5OTcyODAwLCJpIjoiOTk5In0='
              example:
                hasMore: false
                items: []
        '401':
          $ref: '#/components/responses/Unauthenticated'

        # ── Monitors ─────────────────────────────────────────────
        '402':
          $ref: '#/components/responses/PaymentRequired'
  /monitors:
    get:
      operationId: listMonitors
      summary: List monitors
      tags: [Monitors]
      security:
        - apiKey: []
        - oauthBearer: []
      responses:
        '200':
          description: Monitor list
          content:
            application/json:
              schema:
                type: object
                required: [monitors, total]
                properties:
                  monitors:
                    type: array
                    items:
                      $ref: '#/components/schemas/Monitor'
                    example: []
                  total:
                    type: integer
                    example: 0
              example:
                monitors: []
                total: 0
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    post:
      operationId: createMonitor
      summary: Create monitor
      description:
        Creates an instant monitor. Monitors are unlimited. Active monitors
        check every 1 second and cost 21 credits per hour. Events and webhook
        deliveries are included. Creation requires available credits for the
        first hourly charge and username lookup.
      tags: [Monitors]
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: true
        description: Target X username and event types to monitor.
        content:
          application/json:
            schema:
              type: object
              required: [username, eventTypes]
              properties:
                username:
                  type: string
                  description: X username (without @)
                  example: elonmusk
                eventTypes:
                  $ref: '#/components/schemas/EventTypeArray'
                  example: [tweet.new, tweet.reply]
            example:
              username: elonmusk
              eventTypes: [tweet.new, tweet.reply]
      responses:
        '201':
          description: Monitor created
          content:
            application/json:
              schema:
                type: object
                required:
                  [
                    id,
                    username,
                    xUserId,
                    eventTypes,
                    isActive,
                    createdAt,
                    nextBillingAt,
                  ]
                properties:
                  id:
                    type: string
                    example: '42'
                  username:
                    type: string
                    example: elonmusk
                  xUserId:
                    type: string
                    example: '1234567890'
                  eventTypes:
                    $ref: '#/components/schemas/EventTypeArray'
                    example: [tweet.new, tweet.reply]
                  isActive:
                    type: boolean
                    example: true
                  createdAt:
                    type: string
                    format: date-time
                    example: '2025-01-15T12:00:00Z'
                  nextBillingAt:
                    type: string
                    format: date-time
                    description:
                      Next hourly credit charge time. New active monitors are
                      due immediately.
                    example: '2025-01-15T12:00:00Z'
              example:
                id: '42'
                username: elonmusk
                xUserId: '1234567890'
                eventTypes: [tweet.new, tweet.reply]
                isActive: true
                createdAt: '2025-01-15T12:00:00Z'
                nextBillingAt: '2025-01-15T12:00:00Z'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: X user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'user_not_found'
                message: 'X user not found. Check the username.'
        '409':
          description: Monitor already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'monitor_already_exists'
        '500':
          description: Unexpected keyword monitor error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'internal_error'

