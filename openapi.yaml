  /credits/quick-topup:
    post:
      operationId: quickTopUpCredits
      summary: Instantly charge saved card for credits
      tags:
        - Subscribe
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: true
        description: Dollar amount to charge the saved payment method.
        content:
          application/json:
            schema:
              type: object
              required: [dollars]
              properties:
                dollars:
                  type: number
                  description: Dollar amount for the top-up
                  minimum: 10
                  maximum: 500
                  example: 25
            example:
              dollars: 25
      responses:
        '200':
          description: Quick top-up result
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [outcome, balance, credits]
                    properties:
                      outcome:
                        type: string
                        const: charged
                      balance:
                        type: string
                        description:
                          Updated credit balance as a bigint string.
                        example: '1450'
                      credits:
                        type: string
                        description:
                          Credits added by this top-up as a bigint string.
                        example: '1000'
                  - type: object
                    required: [outcome, clientSecret]
                    properties:
                      outcome:
                        type: string
                        const: requires_action
                      clientSecret:
                        type: string
                        description:
                          Payment client secret for completing authentication.
                        example: pi_3abc_secret_xyz
                  - type: object
                    required: [outcome]
                    properties:
                      outcome:
                        type: string
                        const: no_payment_method
              examples:
                charged:
                  summary: Payment succeeded
                  value:
                    outcome: charged
                    balance: '1450'
                    credits: '1000'
                requiresAction:
                  summary: Additional authentication required
                  value:
                    outcome: requires_action
                    clientSecret: pi_3abc_secret_xyz
                noPaymentMethod:
                  summary: No saved payment method
                  value:
                    outcome: no_payment_method
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
