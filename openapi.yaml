                  targetUsername:
                    type: string
                    example: 'jack'
              example:
                isFollowing: true
                isFollowedBy: false
                sourceUsername: 'elonmusk'
                targetUsername: 'jack'
        '400':
          description: Missing params
          content:
            application/json:
              schema:
