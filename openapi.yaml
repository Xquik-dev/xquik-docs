              schema:
                type: object
                required: [accounts]
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/XAccount'
                    example:
                      - id: '42'
                        xUserId: '9876543210'
                        xUsername: 'elonmusk'
                        status: 'active'
                        createdAt: '2025-01-15T12:00:00Z'
              example:
                accounts:
                  - id: '42'
                    xUserId: '9876543210'
                    xUsername: 'elonmusk'
                    status: 'active'
                    createdAt: '2025-01-15T12:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    post:
      operationId: connectXAccount
      summary: Connect X account
      tags: [X Accounts]
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: true
        description:
          X credentials (username, email, password) and optional 2FA secret and
          proxy country.
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                  description: X username
                  example: 'elonmusk'
                email:
                  type: string
                  description: Account email
                  example: 'user@example.com'
                password:
                  type: string
                  description: Account password
                  example: 's3cur3Pa$$w0rd'
                totp_secret:
                  type: string
                  description: TOTP secret for 2FA
                  example: 'JBSWY3DPEHPK3PXP'
                proxy_country:
                  type: string
                  description: Proxy country code
