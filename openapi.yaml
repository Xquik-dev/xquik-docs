  ownershipProofs:
    - 'dns:xquik.com'

security:
  - apiKey: []
  - oauthBearer: []

tags:
  - name: API Keys
    description: API key management (session auth only)
  - name: Account
    description: Account info and settings
  - name: Articles
    description: Long-form X Article extraction
  - name: Communities
    description: X Community info, members, and tweets
  - name: Composition
    description: AI tweet composition, drafts, writing styles, and radar
  - name: Draws
    description: Giveaway draws from tweet replies
  - name: Events
    description: Activity events from monitored accounts
  - name: Extractions
    description: Bulk data extraction (23 tool types)
  - name: Lists
    description: X List followers, members, and tweets
  - name: Media
    description: Media upload and download
  - name: Monitors
    description: Real-time X account monitoring
  - name: Subscribe
    description: Subscription, billing, and credits
  - name: Support
    description: Support ticket management
  - name: Trends
    description: Trending topics and hashtags by region
  - name: Tweets
    description: Look up, search, and analyze individual tweets
  - name: Users
    description: Look up, search, and explore user profiles and relationships
  - name: Webhooks
    description: Webhook endpoint management and delivery
  - name: X Accounts
    description: Connected X account management
  - name: X Write
    description: X write actions (tweets, likes, follows, DMs)
paths:
  # ── Account ──────────────────────────────────────────────
  /account:
    get:
      operationId: getAccount
      summary: Get account info
      tags: [Account]
      security:
        - apiKey: []
        - oauthBearer: []
      responses:
        '200':
          description: Account info
          content:
            application/json:
              schema:
                type: object
                required: [plan, monitorsUsed, monitorsAllowed, monitorBilling]
                properties:
                  plan:
                    type: string
                    enum: [active, inactive]
                    example: active
                  monitorsUsed:
                    type: integer
                    example: 3
                  monitorsAllowed:
                    type: integer
                    deprecated: true
                    description:
                      Deprecated. Monitor slots are unlimited, so this is always
                      Number.MAX_SAFE_INTEGER.
                    example: 9007199254740991
                  monitorBilling:
                    type: object
                    required:
                      [
                        activeDailyEstimate,
                        activeHourlyBurn,
                        creditsPerActiveMonitorDay,
                        creditsPerActiveMonitorHour,
                        eventsIncluded,
                        instantCheckIntervalSeconds,
                        unlimitedSlots,
                      ]
                    properties:
                      activeDailyEstimate:
                        type: string
                        description:
                          Estimated daily credits for currently active monitors.
                        example: '1500'
                      activeHourlyBurn:
                        type: string
                        description:
                          Credits charged each hour for currently active
                          monitors.
                        example: '63'
                      creditsPerActiveMonitorDay:
                        type: string
                        description:
                          Estimated daily credits for 1 active instant monitor.
                        example: '500'
                      creditsPerActiveMonitorHour:
                        type: string
                        description:
                          Hourly credits charged for 1 active instant monitor.
                        example: '21'
                      eventsIncluded:
                        type: boolean
                        description:
                          Webhook and event deliveries are included in monitor
                          billing.
                        example: true
                      instantCheckIntervalSeconds:
                        type: integer
                        description: Active monitors check every 1 second.
                        example: 1
                      unlimitedSlots:
                        type: boolean
                        description: Monitor slot count is unlimited.
                        example: true
                  creditInfo:
                    type: object
                    required:
                      [
                        balance,
                        lifetimePurchased,
                        lifetimeUsed,
                        autoTopupEnabled,
                        autoTopupAmountDollars,
                        autoTopupThreshold,
                      ]
                    properties:
                      balance:
                        type: string
                        description:
                          Bigint string to preserve precision above
                          Number.MAX_SAFE_INTEGER.
                        example: '50000'
                      lifetimePurchased:
                        type: string
                        description: Total purchased credits as a bigint string.
                        example: '140000'
                      lifetimeUsed:
                        type: string
                        description: Total consumed credits as a bigint string.
                        example: '90000'
                      autoTopupEnabled:
                        type: boolean
                        example: false
                      autoTopupAmountDollars:
                        type: number
                        description:
                          Dollar amount charged when automatic top-up runs.
                        example: 10
                      autoTopupThreshold:
                        type: string
                        description:
                          Bigint string threshold that triggers automatic top-up
                          when enabled.
                        example: '50000'
                    example:
                      balance: '50000'
                      lifetimePurchased: '140000'
                      lifetimeUsed: '90000'
                      autoTopupEnabled: false
                      autoTopupAmountDollars: 10
                      autoTopupThreshold: '50000'
                  xUsername:
                    type: string
                    description:
                      Linked X username, omitted when no X account is connected.
                    example: elonmusk
              example:
                plan: active
                monitorsUsed: 3
                monitorsAllowed: 9007199254740991
                monitorBilling:
                  activeDailyEstimate: '1500'
                  activeHourlyBurn: '63'
                  creditsPerActiveMonitorDay: '500'
                  creditsPerActiveMonitorHour: '21'
                  eventsIncluded: true
                  instantCheckIntervalSeconds: 1
                  unlimitedSlots: true
                creditInfo:
                  balance: '50000'
                  lifetimePurchased: '140000'
                  lifetimeUsed: '90000'
                  autoTopupEnabled: false
                  autoTopupAmountDollars: 10
                  autoTopupThreshold: '50000'
                xUsername: elonmusk
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    patch:
      operationId: updateAccount
      summary: Update account locale
      tags: [Account]
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: true
        description: Locale preference for the account.
        content:
          application/json:
            schema:
              type: object
              required: [locale]
              properties:
                locale:
                  type: string
                  enum: [en, tr, es]
                  example: en
            example:
              locale: en
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'

        '402':
          $ref: '#/components/responses/PaymentRequired'
  /account/x-identity:
    put:
      operationId: setXIdentity
      summary: Set linked X username
      tags: [Account]
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: true
        description: X username to link to this account.
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  description: X username without @
                  example: elonmusk
            example:
              username: elonmusk
      responses:
        '200':
          description: X identity linked
          content:
            application/json:
              schema:
                type: object
                required: [success, xUsername]
                properties:
                  success:
                    type: boolean
                    const: true
                  xUsername:
                    type: string
                    example: elonmusk
              example:
                success: true
                xUsername: elonmusk
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'

        # ── API Keys ─────────────────────────────────────────────
        '402':
          $ref: '#/components/responses/PaymentRequired'
  /api-keys:
    get:
      operationId: listApiKeys
      summary: List API keys
      tags: [API Keys]
      security:
        - apiKey: []
        - oauthBearer: []
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKey'
                    example: []
              example:
                keys: []
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    post:
      operationId: createApiKey
      summary: Create API key
      tags: [API Keys]
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: true
        description: Optional display name for the new API key.
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: My API Key
            example:
              name: My API Key
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                type: object
                required: [id, fullKey, name, prefix, createdAt]
                properties:
                  id:
                    type: string
                    example: '42'
                  fullKey:
                    type: string
                    example: xq_live_abc123def456
                  name:
                    type: string
                    example: My API Key
                  prefix:
                    type: string
                    example: xq_live_abc1
                  createdAt:
                    type: string
                    format: date-time
                    example: '2025-01-15T12:00:00Z'
              example:
                id: '42'
                fullKey: xq_live_abc123def456
                name: My API Key
                prefix: xq_live_abc1
                createdAt: '2025-01-15T12:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthenticated'

        '402':
          $ref: '#/components/responses/PaymentRequired'
  /api-keys/{id}:
    delete:
      operationId: revokeApiKey
      summary: Revoke API key
      tags: [API Keys]
      security:
        - apiKey: []
        - oauthBearer: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Subscribe ────────────────────────────────────────────
  /subscribe:
    post:
      operationId: subscribe
      summary: Get billing URL
      tags: [Subscribe]
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: false
        description: Optional subscription tier to pre-select at checkout.
        content:
          application/json:
            schema:
              type: object
              properties:
                tier:
                  type: string
                  enum: [starter, pro, business]
                  description: Subscription tier to pre-select.
                  example: pro
            example:
              tier: pro
      responses:
        '200':
          description: Billing URL
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url:
                    type: string
                    format: uri
                    example: 'https://xquik.com/billing/session'
                  status:
                    type: string
                    enum: [checkout_created, already_subscribed, payment_issue]
                    example: checkout_created
                  message:
                    type: string
                    example: Billing session created
              example:
                url: 'https://xquik.com/billing/session'
                status: checkout_created
                message: Billing session created
        '401':
          $ref: '#/components/responses/Unauthenticated'

        # ── Composition ──────────────────────────────────────────
        '402':
          $ref: '#/components/responses/PaymentRequired'
  /compose:
    post:
      operationId: compose
      summary: Compose, refine, or score a tweet
      tags: [Composition]
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: true
        description: Workflow step, topic, goal, and optional style parameters.
        content:
          application/json:
            schema:
              type: object
              required: [step]
              properties:
                step:
                  type: string
                  enum: [compose, refine, score]
                  description: Workflow step
                  example: compose
                topic:
                  type: string
                  description: Tweet topic (compose, refine)
                  example: AI trends in 2025
                goal:
                  type: string
                  enum: [engagement, followers, authority, conversation]
                  description: Optimization goal
                  example: engagement
                draft:
                  type: string
                  description: Tweet draft text to evaluate (score)
                  example: "AI is changing everything. Here's why."
                tone:
                  type: string
                  description: Desired tone (refine)
                  example: professional
                styleUsername:
                  type: string
                  description:
                    Cached style username for voice matching (compose)
                  example: elonmusk
                additionalContext:
                  type: string
                  description: Extra context or URLs (refine)
                  example: 'https://x.com/elonmusk/status/1234567890'
                callToAction:
                  type: string
                  description: Desired call to action (refine)
                  example: Follow for more
                mediaType:
                  type: string
                  enum: [photo, video, none]
                  description: Media type (refine)
                  example: none
                hasLink:
                  type: boolean
                  description: Whether a link is attached (score)
                  example: false
                hasMedia:
                  type: boolean
                  description: Whether media is attached (score)
                  example: false
            example:
              step: compose
              topic: AI trends in 2025
              goal: engagement
      responses:
        '200':
          description: Composition result
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
                    description: Generated or refined tweet text
                    example:
                      'AI is reshaping every industry. Here are 5 trends to
                      watch in 2025.'
                  score:
                    type: number
                    description: Engagement score (0-100)
                    example: 78
                  feedback:
                    type: string
                    description: AI feedback on the draft
                    example: 'Strong hook. Consider adding a call to action.'
                  suggestions:
                    type: array
                    items:
                      type: string
                    description: Improvement suggestions
                    example: ['Add a thread hook', 'Include a relevant hashtag']
                additionalProperties: true
              example:
                text:
                  'AI is reshaping every industry. Here are 5 trends to watch in
                  2025.'
                score: 78
                feedback: 'Strong hook. Consider adding a call to action.'
                suggestions: ['Add a thread hook', 'Include a relevant hashtag']
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'

        '402':
          $ref: '#/components/responses/PaymentRequired'
  /drafts:
    get:
      operationId: listDrafts
      summary: List saved drafts
      tags: [Composition]
      security:
        - apiKey: []
        - oauthBearer: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - name: afterCursor
          in: query
          schema:
            type: string
          description: Cursor for pagination
      responses:
        '200':
          description: Draft list
          content:
            application/json:
              schema:
                type: object
                required: [drafts, hasMore]
                properties:
                  drafts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Draft'
                    example: []
                  hasMore:
                    type: boolean
                    example: false
                  nextCursor:
                    type: string
                    example: 'abc123'
              example:
                drafts: []
                hasMore: false
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    post:
      operationId: createDraft
      summary: Save a tweet draft
      tags: [Composition]
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: true
        description: Draft text with optional topic and optimization goal.
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  example: 'AI is the future of productivity'
                topic:
                  type: string
                  example: 'AI trends'
                goal:
                  type: string
                  enum: [engagement, followers, authority, conversation]
                  example: engagement
            example:
              text: 'AI is the future of productivity'
              topic: 'AI trends'
              goal: engagement
      responses:
        '201':
          description: Draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftDetail'
              example:
                id: '42'
                text: 'AI is the future of productivity'
                topic: 'AI trends'
                goal: engagement
                createdAt: '2025-01-15T12:00:00Z'
                updatedAt: '2025-01-16T09:30:00Z'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /drafts/{id}:
    get:
      operationId: getDraft
      summary: Get draft by ID
      tags: [Composition]
      security:
        - apiKey: []
        - oauthBearer: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Draft details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftDetail'
              example:
                id: '42'
                text: 'AI is the future of productivity'
                topic: 'AI trends'
                goal: engagement
                createdAt: '2025-01-15T12:00:00Z'
                updatedAt: '2025-01-16T09:30:00Z'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    delete:
      operationId: deleteDraft
      summary: Delete a draft
      tags: [Composition]
      security:
        - apiKey: []
        - oauthBearer: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /styles:
    get:
      operationId: listStyles
      summary: List cached style profiles
      tags: [Composition]
      security:
        - apiKey: []
        - oauthBearer: []
      responses:
        '200':
          description: Style profile list
          content:
            application/json:
              schema:
                type: object
                required: [styles]
                properties:
                  styles:
                    type: array
                    items:
                      $ref: '#/components/schemas/StyleProfileSummary'
                    example: []
              example:
                styles: []
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    post:
      operationId: analyzeStyle
      summary: Analyze writing style from recent tweets
      tags: [Composition]
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: true
        description: X username whose recent tweets define the style.
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  description: X username to analyze
                  example: elonmusk
            example:
              username: elonmusk
      responses:
        '200':
          description: Fresh cached style profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StyleProfile'
              example:
                xUsername: 'elonmusk'
                tweetCount: 50
                isOwnAccount: true
                fetchedAt: '2025-01-15T12:00:00Z'
                tweets:
                  - id: '1234567890'
                    text: 'Just launched our new feature!'
        '201':
          description: Style profile created or refreshed
          content:
