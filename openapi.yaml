    get:
      operationId: getTrends
      summary: Get trending topics
      tags: [X API]
      x-payment-info:
        protocols: [mpp]
        pricingMode: fixed
        price: "900"
      responses:
        "200":
          description: List of trending topics
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "402":
          $ref: "#/components/responses/PaymentRequired"

  /x/tweets/search:
    get:
      operationId: searchTweets
      summary: Search tweets
      tags: [X API]
      x-payment-info:
        protocols: [mpp]
        pricingMode: range
        minPrice: "300"
        maxPrice: "60000"
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (keywords, #hashtags, from:user, "exact phrases", since:YYYY-MM-DD, until:YYYY-MM-DD, min_faves:N)
        - name: queryType
          in: query
          required: false
          schema:
            type: string
            enum: [Latest, Top]
            default: Latest
          description: Sort order — Latest (chronological) or Top (engagement-ranked)
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor from previous response
        - name: sinceTime
          in: query
          schema:
            type: string
          description: ISO 8601 timestamp — only return tweets after this time
        - name: untilTime
          in: query
          schema:
            type: string
          description: ISO 8601 timestamp — only return tweets before this time
        - name: limit
          in: query
          required: false
          deprecated: true
          schema:
            type: integer
            default: 20
            maximum: 200
          description: Deprecated — use cursor-based pagination instead
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTweets"
        "400":
          description: Missing query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "502":
          $ref: "#/components/responses/XApiError"

