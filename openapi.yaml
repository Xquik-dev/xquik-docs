        fetchedAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'
        tweets:
          type: array
          items:
            type: object
            required: [id, text]
            properties:
              id:
                type: string
                example: '1234567890'
              text:
                type: string
                example: 'Just launched our new feature!'
              createdAt:
                type: string
                example: '2025-01-15T12:00:00Z'
              authorUsername:
                type: string
                example: 'elonmusk'
          example:
            - id: '1234567890'
              text: 'Just launched our new feature!'

    RadarItem:
      description: Trending topic with score, category, source, and region.
      type: object
      required: [title, score, category, source, region, publishedAt]
      properties:
        title:
          type: string
          example: 'AI Revolution in 2025'
        url:
          type: string
          example: 'https://example.com/article/ai-revolution'
        score:
          type: number
          example: 95.5
        category:
          type: string
          example: 'Technology'
        source:
          type: string
          example: 'X'
        region:
          type: string
          example: 'US'
        publishedAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'
        description:
          type: string
          example: 'AI is transforming every industry'
        imageUrl:
          type: string
          example: 'https://example.com/images/ai.jpg'

    Integration:
      description:
        Third-party integration (e.g. Telegram) subscribed to monitor events.
      type: object
      required: [id, type, name, config, eventTypes, isActive, createdAt]
      properties:
        id:
          type: string
          example: '42'
        type:
          type: string
          enum: [telegram]
          x-stainless-const: true
          example: 'telegram'
        name:
          type: string
          example: 'My Telegram Bot'
        config:
          type: object
          additionalProperties: true
          x-stainless-any: true
          description: Integration config — shape varies by type (JSON)
          x-stainless-terraform-type: string
          example:
            chatId: '-1001234567890'
        eventTypes:
          $ref: '#/components/schemas/EventTypeArray'
          example: ['tweet.new', 'follower.gained']
        isActive:
          type: boolean
          example: true
        silentPush:
          type: boolean
          example: false
        scopeAllMonitors:
          type: boolean
          example: true
        messageTemplate:
          type: string
          example: 'New event: {{event.type}}'
        filters:
          type: object
          additionalProperties: true
          x-stainless-any: true
          description: Event filter rules (JSON)
          x-stainless-terraform-type: string
          example:
            minFollowers: 100
        createdAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'

    IntegrationDelivery:
      description:
        Integration delivery attempt record with status and retry count.
      type: object
      required: [id, eventType, status, attempts, createdAt]
      properties:
        id:
          type: string
          example: '42'
        eventType:
          type: string
          example: 'tweet.new'
        status:
          type: string
          example: 'delivered'
        attempts:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'
        deliveredAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:01Z'
        lastError:
          type: string
          example: ''
        lastStatusCode:
          type: integer
          example: 200
        sourceId:
          type: string
          example: '100'
        sourceType:
          type: string
          example: 'monitor'

