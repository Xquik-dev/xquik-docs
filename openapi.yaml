components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
      description: API key passed via the X-Api-Key header
    oauthBearer:
      type: http
      scheme: bearer
      description: OAuth 2.1 access token

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID (stringified bigint)
    Limit:
      name: limit
      in: query
      description: Maximum number of items to return (1-100, default 50)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    After:
      name: after
      in: query
      schema:
        type: string
      description: Cursor for keyset pagination
    StyleId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Style profile ID or X username

  responses:
    Success:
      description: Success
      content:
        application/json:
          schema:
            type: object
            required: [success]
            properties:
              success:
                type: boolean
                const: true
                example: true
          example:
            success: true
    NoContent:
      description: Deleted
    Unauthenticated:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InvalidInput:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PaymentRequired:
      description:
        Payment required. Returns a WWW-Authenticate header with an MPP
        challenge for pay-per-use endpoints, or indicates a subscription/credit
        issue for identity-authenticated endpoints.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    WriteError:
      description: >
        Write operation failed. Possible error codes include x_write_failed,
        x_write_ambiguous, x_duplicate_action, x_daily_limit (429 — account
        reached daily posting limit, wait 24 hours), and x_write_unconfirmed
        (202 — action may have completed but could not be confirmed, verify
        before retrying).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    XApiError:
      description: X API unavailable, unauthorized, or rate limited
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    PaginatedTweets:
      description: Paginated list of tweets with cursor-based navigation.
      type: object
      required: [tweets, has_next_page, next_cursor]
      properties:
        tweets:
          type: array
          items:
            $ref: '#/components/schemas/SearchTweet'
          example:
            - id: '1234567890'
              text: 'Just launched our new feature!'
        has_next_page:
          type: boolean
          example: true
        next_cursor:
          type: string
          example: 'DAACCgACGRElMJcAAA'
    PaginatedUsers:
      description: Paginated list of user profiles with cursor-based navigation.
      type: object
      required: [users, has_next_page, next_cursor]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
          example:
            - id: '9876543210'
              username: 'elonmusk'
              name: 'Elon Musk'
        has_next_page:
          type: boolean
          example: true
        next_cursor:
          type: string
          example: 'DAACCgACGRElMJcAAA'
    Error:
      description: Error response containing a machine-readable error code.
      type: object
      required: [error]
      properties:
        error:
          type: string
          title: ErrorCode
          enum:
            - internal_error
            - invalid_format
            - invalid_id
            - invalid_input
            - invalid_params
            - invalid_tool_type
            - invalid_tweet_id
            - invalid_tweet_url
            - invalid_username
            - missing_params
            - missing_query
            - monitor_already_exists
            - monitor_limit_reached
            - no_subscription
            - not_found
            - stream_registration_failed
            - subscription_inactive
            - tweet_not_found
            - unauthenticated
            - usage_limit_reached
            - user_not_found
            - webhook_inactive
            - x_api_rate_limited
            - x_api_unavailable
            - x_api_unauthorized

          example: 'invalid_input'
    EventType:
      description: Type of monitor event fired when account activity occurs.
      type: string
      enum:
        - tweet.new
        - tweet.reply
        - tweet.retweet
        - tweet.quote
        - follower.gained
        - follower.lost
      example: 'tweet.new'

    EventTypeArray:
      description: Array of event types to subscribe to.
      type: array
      items:
        $ref: '#/components/schemas/EventType'
      minItems: 1
      example: ['tweet.new', 'follower.gained']

    ExtractionToolType:
      description: Identifier for the extraction tool used to run a job.
      type: string
      example: 'follower_explorer'
      enum:
        - article_extractor
        - community_extractor
        - community_moderator_explorer
        - community_post_extractor
        - community_search
        - follower_explorer
        - following_explorer
        - list_follower_explorer
        - list_member_extractor
        - list_post_extractor
        - mention_extractor
        - people_search
        - post_extractor
        - quote_extractor
        - reply_extractor
        - repost_extractor
        - space_explorer
        - thread_extractor
        - tweet_search_extractor
        - verified_follower_explorer

    ApiKey:
      description: API key metadata returned when listing keys.
      type: object
      required: [id, name, prefix, isActive, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        prefix:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time

    Monitor:
      description: Account monitor that tracks activity for a given X user.
      type: object
      required: [id, username, xUserId, eventTypes, isActive, createdAt]
      properties:
        id:
          type: string
          example: '42'
        username:
          type: string
          example: 'elonmusk'
        xUserId:
          type: string
          example: '9876543210'
        eventTypes:
          $ref: '#/components/schemas/EventTypeArray'
          example: ['tweet.new', 'follower.gained']
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'

    Event:
      description:
        Monitor event summary with type, username, and occurrence time.
      type: object
      required: [id, type, username, monitorId, occurredAt, data]
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/EventType'
        username:
          type: string
        monitorId:
          type: string
        occurredAt:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true

    EventDetail:
      description:
        Full monitor event including payload data and optional X event ID.
      type: object
      required: [id, type, username, monitorId, occurredAt, data]
      properties:
        id:
          type: string
          example: '42'
        type:
          $ref: '#/components/schemas/EventType'
          example: 'tweet.new'
        username:
          type: string
          example: 'elonmusk'
        monitorId:
          type: string
          example: '10'
        occurredAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'
        data:
          type: object
          additionalProperties: true
          x-stainless-any: true
          description: Event payload — shape varies by event type (JSON)
          x-stainless-terraform-type: string
          example:
            tweetId: '1234567890'
        xEventId:
          type: string
          example: '1234567890'

    ExtractionJob:
      description: Extraction job tracking status, tool type, and result count.
      type: object
      required: [id, toolType, status, totalResults, createdAt]
      properties:
        id:
          type: string
        toolType:
          $ref: '#/components/schemas/ExtractionToolType'
        status:
          type: string
          enum: [running, completed, failed]
        totalResults:
          type: integer
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    DrawListItem:
      description: Giveaway draw summary with entry counts and status.
      type: object
      required: [id, tweetUrl, status, totalEntries, validEntries, createdAt]
      properties:
        id:
          type: string
        tweetUrl:
          type: string
          format: uri
        status:
          type: string
        totalEntries:
          type: integer
        validEntries:
          type: integer
        createdAt:
          type: string
          format: date-time
        drawnAt:
          type: string
          format: date-time

    DrawDetail:
      description: Full giveaway draw with tweet metrics, entries, and timing.
      type: object
      required:
        - id
        - tweetUrl
        - tweetId
        - tweetText
        - tweetAuthorUsername
        - status
        - totalEntries
        - validEntries
        - tweetLikeCount
        - tweetRetweetCount
        - tweetReplyCount
        - tweetQuoteCount
        - createdAt
      properties:
        id:
          type: string
          example: 'https://example.com/webhook'
        tweetUrl:
          type: string
          format: uri
        tweetId:
          type: string
        tweetText:
          type: string
        tweetAuthorUsername:
          type: string
        status:
          type: string
        totalEntries:
          type: integer
        validEntries:
          type: integer
        tweetLikeCount:
          type: integer
        tweetRetweetCount:
          type: integer
        tweetReplyCount:
          type: integer
        tweetQuoteCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        drawnAt:
          type: string
          format: date-time

    Winner:
      description: Giveaway draw winner with position and backup flag.
      type: object
      required: [authorUsername, tweetId, position, isBackup]
      properties:
        authorUsername:
          type: string
        tweetId:
          type: string
        position:
          type: integer
        isBackup:
          type: boolean

    Webhook:
      description: Webhook endpoint registered to receive event deliveries.
      type: object
      required: [id, url, eventTypes, isActive, createdAt]
      properties:
        id:
          type: string
          example: '42'
        url:
          type: string
          format: uri
          example: 'https://example.com/webhooks/xquik'
        eventTypes:
          $ref: '#/components/schemas/EventTypeArray'
          example: ['tweet.new', 'follower.gained']
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: '2025-01-15T12:00:00Z'

    Delivery:
      description: Webhook delivery attempt record with status and retry count.
      type: object
      required: [id, streamEventId, status, attempts, createdAt]
      properties:
        id:
          type: string
        streamEventId:
          type: string
        status:
          type: string
        attempts:
          type: integer
        createdAt:
          type: string
          format: date-time
        deliveredAt:
          type: string
          format: date-time
        lastStatusCode:
          type: integer
        lastError:
          type: string

    TweetDetail:
      description:
        Full tweet with text, engagement metrics, media, and metadata.
      type: object
      required:
        [
          id,
          text,
          retweetCount,
          replyCount,
          likeCount,
          quoteCount,
          viewCount,
          bookmarkCount,
        ]
      properties:
        id:
          type: string
          example: '1234567890'
        text:
          type: string
          example: 'Just launched our new feature!'
        createdAt:
          type: string
          example: '2025-01-15T12:00:00Z'
        isNoteTweet:
          type: boolean
          description:
            Whether this is a Note Tweet (long-form post, up to 25,000
            characters)
          example: false
        isReply:
          type: boolean
          description: Whether this tweet is a reply to another tweet
          example: false
        isQuoteStatus:
          type: boolean
          description: Whether this tweet quotes another tweet
          example: false
        conversationId:
          type: string
          description: ID of the root tweet in the conversation thread
          example: '1234567890'
        source:
          type: string
          description: Client application used to post this tweet
          example: 'Twitter Web App'
        entities:
          type: object
          additionalProperties: true
          description:
            Parsed entities from the tweet text (URLs, mentions, hashtags,
            media)
        quoted_tweet:
          type: object
          additionalProperties: true
          description:
            The quoted tweet object, present when isQuoteStatus is true
        media:
          type: array
          items:
            type: object
            properties:
              mediaUrl:
                type: string
                example: 'https://pbs.twimg.com/media/example.jpg'
              type:
                type: string
                enum: [photo, video, animated_gif]
                example: 'photo'
              url:
                type: string
                example: 'https://t.co/abc123'
          description: Attached media items, omitted when the tweet has no media
        retweetCount:
          type: integer
          example: 5
        replyCount:
          type: integer
          example: 3
        likeCount:
          type: integer
          example: 42
        quoteCount:
          type: integer
          example: 1
        viewCount:
          type: integer
          example: 1500
        bookmarkCount:
          type: integer
          example: 2

    TweetAuthor:
      description:
        Author of a tweet with follower count and verification status.
      type: object
      required: [id, username, followers, verified]
      properties:
        id:
          type: string
          example: '9876543210'
        username:
          type: string
          example: 'elonmusk'
        followers:
          type: integer
          example: 150000000
        verified:
          type: boolean
          example: true
        profilePicture:
          type: string
          example: 'https://pbs.twimg.com/profile_images/example.jpg'

    SearchTweet:
      description: Tweet returned from search results with inline author info.
      type: object
      required: [id, text]
      properties:
        id:
          type: string
          example: '1234567890'
        text:
          type: string
          example: 'Just launched our new feature!'
        createdAt:
          type: string
          example: '2025-01-15T12:00:00Z'
        isNoteTweet:
          type: boolean
          description:
            True for Note Tweets (long-form content, up to 25,000 characters)
          example: false
        likeCount:
          type: integer
          example: 42
        retweetCount:
          type: integer
          example: 5
        replyCount:
          type: integer
          example: 3
        quoteCount:
          type: integer
          example: 1
        viewCount:
          type: integer
          example: 1500
        bookmarkCount:
          type: integer
          example: 2
        author:
          type: object
          required: [id, username, name]
          properties:
            id:
              type: string
              example: '9876543210'
            username:
              type: string
              example: 'elonmusk'
            name:
              type: string
              example: 'Elon Musk'
            verified:
              type: boolean
              example: true

    UserProfile:
      description:
        X user profile with bio, follower counts, and verification status.
      type: object
      required: [id, username, name]
      properties:
        id:
          type: string
          example: '9876543210'
        username:
          type: string
          example: 'elonmusk'
        name:
          type: string
          example: 'Elon Musk'
        description:
          type: string
          example: 'CEO of Tesla, SpaceX, and X'
        followers:
          type: integer
          example: 150000000
        following:
          type: integer
          example: 500
        verified:
          type: boolean
          example: true
        profilePicture:
          type: string
          example: 'https://pbs.twimg.com/profile_images/example.jpg'
        location:
          type: string
          example: 'Austin, TX'
        createdAt:
          type: string
          example: '2009-06-02T20:12:29Z'
        statusesCount:
          type: integer
          example: 35000

    # ── New schemas ──────────────────────────────────────────
    Draft:
      description: Saved tweet draft with optional topic and goal.
      type: object
      required: [id, text, createdAt]
      properties:
        id:
          type: string
          example: '42'
        text:
          type: string
