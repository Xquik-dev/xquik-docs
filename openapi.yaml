openapi: 3.1.0
info:
  title: Xquik API
  version: "1.0"
  description: X real-time data platform — extractions, giveaway draws, monitoring, webhooks.
  guidance: >
    Xquik provides real-time X (Twitter) data via 16 MPP pay-per-use endpoints.
    No account or API key needed — pay per call via Tempo (USDC). Tweet lookup:
    GET /x/tweets/{tweetId}. Tweet search: GET
    /x/tweets/search?q={query}&limit={n}. User lookup: GET /x/users/{username}.
    Follower check: GET /x/followers/check?source={a}&target={b}. Article
    extraction: GET /x/articles/{tweetId}. Media download: POST
    /x/media/download with tweetInput or tweetIds body. User tweets: GET
    /x/users/{id}/tweets. Trending topics: GET /trends?woeid={id}&count={n}
    or GET /x/trends.
  contact:
    name: Xquik
    url: https://xquik.com

servers:
  - url: https://xquik.com/api/v1

x-discovery:
  ownershipProofs:
    - "dns:xquik.com"

security:
  - apiKey: []
  - oauthBearer: []

tags:
  - name: Account
    description: Account info & settings
  - name: API Keys
    description: API key management (session auth only)
  - name: Subscribe
    description: Subscription & billing
  - name: Composition
    description: Tweet composition, drafts, writing styles & radar
  - name: Monitors
    description: Real-time X account monitoring
  - name: Events
    description: Activity events from monitored accounts
  - name: Extractions
    description: Bulk data extraction (20 tool types)
  - name: Draws
    description: Giveaway draws from tweet replies
  - name: Webhooks
    description: Webhook endpoint management & delivery
  - name: Integrations
    description: Push notification integrations (Telegram)
  - name: X API
    description: X data lookups (subscription required)
  - name: X Accounts
    description: Connected X account management
  - name: X Write
    description: X write actions (tweets, likes, follows, DMs)
  - name: Media
    description: Media upload & download
  - name: Trends
    description: Trending topics by region
  - name: Bot
    description: Telegram bot service endpoints
  - name: Support
    description: Support ticket management

paths:
  # ── Account ──────────────────────────────────────────────
  /account:
    get:
      operationId: getAccount
      summary: Get account info
      tags: [Account]
      security:
        - apiKey: []
      responses:
        "200":
          description: Account info
          content:
            application/json:
              schema:
                type: object
                required: [plan, monitorsUsed, monitorsAllowed]
                properties:
                  plan:
                    type: string
                    enum: [active, inactive]
                  monitorsUsed:
                    type: integer
                  monitorsAllowed:
                    type: integer
                  currentPeriod:
                    type: object
                    required: [start, end, usagePercent]
                    properties:
                      start:
                        type: string
                        format: date-time
                      end:
                        type: string
                        format: date-time
                      usagePercent:
                        type: number
        "401":
          $ref: "#/components/responses/Unauthenticated"
    patch:
      operationId: updateAccount
      summary: Update account locale
      tags: [Account]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locale]
              properties:
                locale:
                  type: string
                  enum: [en, tr, es]
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /account/x-identity:
    put:
      operationId: setXIdentity
      summary: Set linked X username
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  description: X username without @
      responses:
        "200":
          description: X identity linked
          content:
            application/json:
              schema:
                type: object
                required: [success, xUsername]
                properties:
                  success:
                    type: boolean
                    const: true
                  xUsername:
                    type: string
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  # ── API Keys ─────────────────────────────────────────────
  /api-keys:
    get:
      operationId: listApiKeys
      summary: List API keys
      tags: [API Keys]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKey"
        "401":
          $ref: "#/components/responses/Unauthenticated"
    post:
      operationId: createApiKey
      summary: Create API key
      tags: [API Keys]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                type: object
                required: [id, fullKey, name, prefix, createdAt]
                properties:
                  id:
                    type: string
                  fullKey:
                    type: string
                  name:
                    type: string
                  prefix:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api-keys/{id}:
    delete:
      operationId: revokeApiKey
      summary: Revoke API key
      tags: [API Keys]
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Subscribe ────────────────────────────────────────────
  /subscribe:
    post:
      operationId: subscribe
      summary: Get checkout or billing URL
      tags: [Subscribe]
      responses:
        "200":
          description: Stripe checkout or billing portal URL
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url:
                    type: string
                    format: uri
                  status:
                    type: string
                    enum: [checkout_created, already_subscribed, payment_issue]
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthenticated"

  # ── Composition ──────────────────────────────────────────
  /compose:
    post:
      operationId: compose
      summary: Compose, refine, or score a tweet
      tags: [Composition]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [step]
              properties:
                step:
                  type: string
                  enum: [compose, refine, score]
                  description: Workflow step
                topic:
                  type: string
                  description: Tweet topic (compose, refine)
                goal:
                  type: string
                  enum: [engagement, followers, authority, conversation]
                  description: Optimization goal
                draft:
                  type: string
                  description: Tweet draft text to evaluate (score)
                tone:
                  type: string
                  description: Desired tone (refine)
                styleUsername:
                  type: string
                  description: Cached style username for voice matching (compose)
                additionalContext:
                  type: string
                  description: Extra context or URLs (refine)
                callToAction:
                  type: string
                  description: Desired call to action (refine)
                mediaType:
                  type: string
                  enum: [photo, video, none]
                  description: Media type (refine)
                hasLink:
                  type: boolean
                  description: Whether a link is attached (score)
                hasMedia:
                  type: boolean
                  description: Whether media is attached (score)
      responses:
        "200":
          description: Composition result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /drafts:
    get:
      operationId: listDrafts
      summary: List saved drafts
      tags: [Composition]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: afterCursor
          in: query
          schema:
            type: string
          description: Cursor for pagination
      responses:
        "200":
          description: Draft list
          content:
            application/json:
              schema:
                type: object
                required: [drafts, hasMore]
                properties:
                  drafts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Draft"
                  hasMore:
                    type: boolean
                  nextCursor:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthenticated"
    post:
      operationId: createDraft
      summary: Save a tweet draft
      tags: [Composition]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                topic:
                  type: string
                goal:
                  type: string
                  enum: [engagement, followers, authority, conversation]
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftDetail"
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /drafts/{id}:
    get:
      operationId: getDraft
      summary: Get draft by ID
      tags: [Composition]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Draft details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftDetail"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteDraft
      summary: Delete a draft
      tags: [Composition]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"

  /styles:
    get:
      operationId: listStyles
      summary: List cached style profiles
      tags: [Composition]
      responses:
        "200":
          description: Style profile list
          content:
            application/json:
              schema:
                type: object
                required: [styles]
                properties:
                  styles:
                    type: array
                    items:
                      $ref: "#/components/schemas/StyleProfileSummary"
        "401":
          $ref: "#/components/responses/Unauthenticated"
    post:
      operationId: analyzeStyle
      summary: Analyze writing style from recent tweets
      tags: [Composition]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  description: X username to analyze
      responses:
        "200":
          description: Style profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StyleProfile"
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /styles/compare:
    get:
      operationId: compareStyles
      summary: Compare two style profiles
      tags: [Composition]
      parameters:
        - name: username1
          in: query
          required: true
          schema:
            type: string
          description: First username to compare
        - name: username2
          in: query
          required: true
          schema:
            type: string
          description: Second username to compare
      responses:
        "200":
          description: Style comparison
          content:
            application/json:
              schema:
                type: object
                required: [style1, style2]
                properties:
                  style1:
                    $ref: "#/components/schemas/StyleProfile"
                  style2:
                    $ref: "#/components/schemas/StyleProfile"
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"

  /styles/{username}:
    get:
      operationId: getStyle
      summary: Get cached style profile
      tags: [Composition]
      parameters:
        - $ref: "#/components/parameters/StyleUsername"
      responses:
        "200":
          description: Style profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StyleProfile"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: saveStyle
      summary: Save style profile with custom tweets
      tags: [Composition]
      parameters:
        - $ref: "#/components/parameters/StyleUsername"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, tweets]
              properties:
                label:
                  type: string
                  description: Display label for the style
                tweets:
                  type: array
                  items:
                    type: object
                    required: [text]
                    properties:
                      text:
                        type: string
                  description: Array of tweet objects
      responses:
        "200":
          description: Style profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StyleProfile"
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"
    delete:
      operationId: deleteStyle
      summary: Delete a style profile
      tags: [Composition]
      parameters:
        - $ref: "#/components/parameters/StyleUsername"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"

  /styles/{username}/performance:
    get:
      operationId: getStylePerformance
      summary: Get engagement metrics for style tweets
      tags: [Composition]
      parameters:
        - $ref: "#/components/parameters/StyleUsername"
      responses:
        "200":
          description: Performance metrics
          content:
            application/json:
              schema:
                type: object
                required: [xUsername, tweetCount, tweets]
                properties:
                  xUsername:
                    type: string
                  tweetCount:
                    type: integer
                  tweets:
                    type: array
                    items:
                      type: object
                      required: [id, text]
                      properties:
                        id:
                          type: string
                        text:
                          type: string
                        likeCount:
                          type: integer
                        retweetCount:
                          type: integer
                        replyCount:
                          type: integer
                        viewCount:
                          type: integer
                        createdAt:
                          type: string
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "404":
          $ref: "#/components/responses/NotFound"

  /radar:
    get:
      operationId: getRadar
      summary: Get trending topics from curated sources
      tags: [Composition]
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: "Filter by category (general, tech, dev, etc.)"
        - name: count
          in: query
          schema:
            type: integer
          description: Number of items to return
        - name: hours
          in: query
          schema:
            type: integer
          description: Lookback window in hours
        - name: region
          in: query
          schema:
            type: string
          description: "Region filter (us, global, etc.)"
        - name: source
          in: query
          schema:
            type: string
            enum: [github, google_trends, hacker_news, polymarket, reddit, trustmrr, wikipedia]
          description: "Source filter. One of: github, google_trends, hacker_news, polymarket, reddit, trustmrr, wikipedia"
      responses:
        "200":
          description: Radar items
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/RadarItem"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthenticated"

  # ── Monitors ─────────────────────────────────────────────
  /monitors:
    get:
      operationId: listMonitors
      summary: List monitors
      tags: [Monitors]
      responses:
        "200":
          description: Monitor list
          content:
            application/json:
              schema:
                type: object
                required: [monitors, total]
                properties:
                  monitors:
                    type: array
                    items:
                      $ref: "#/components/schemas/Monitor"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthenticated"
    post:
      operationId: createMonitor
      summary: Create monitor
      tags: [Monitors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, eventTypes]
              properties:
                username:
                  type: string
                  description: X username (without @)
                eventTypes:
                  $ref: "#/components/schemas/EventTypeArray"
      responses:
        "201":
          description: Monitor created
          content:
            application/json:
              schema:
                type: object
                required: [id, username, xUserId, eventTypes, createdAt]
                properties:
                  id:
                    type: string
                  username:
                    type: string
                  xUserId:
                    type: string
                  eventTypes:
                    $ref: "#/components/schemas/EventTypeArray"
                  createdAt:
                    type: string
                    format: date-time
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          description: Monitor limit reached
          content:
            application/json:
              schema:
                type: object
                required: [error, limit]
                properties:
                  error:
                    type: string
                  limit:
                    type: integer
                    description: Current monitor quota
        "404":
          description: X user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Monitor already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Stream registration failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /monitors/{id}:
    get:
      operationId: getMonitor
      summary: Get monitor
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Monitor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateMonitor
      summary: Update monitor
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventTypes:
                  $ref: "#/components/schemas/EventTypeArray"
                isActive:
                  type: boolean
      responses:
        "200":
          description: Monitor updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteMonitor
      summary: Deactivate monitor
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Events ───────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      summary: List events
      tags: [Events]
      security:
        - apiKey: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/After"
        - name: monitorId
          in: query
          schema:
            type: string
        - name: eventType
          in: query
          schema:
            $ref: "#/components/schemas/EventType"
      responses:
        "200":
          description: Event list
          content:
            application/json:
              schema:
                type: object
                required: [events, hasMore]
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  hasMore:
                    type: boolean
                  nextCursor:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /events/{id}:
    get:
      operationId: getEvent
      summary: Get event
      tags: [Events]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Extractions ──────────────────────────────────────────
  /extractions:
    get:
      operationId: listExtractions
      summary: List extraction jobs
      tags: [Extractions]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/After"
        - name: toolType
          in: query
          schema:
            $ref: "#/components/schemas/ExtractionToolType"
        - name: status
          in: query
          schema:
            type: string
            enum: [running, completed, failed]
      responses:
        "200":
          description: Extraction job list
          content:
            application/json:
              schema:
                type: object
                required: [extractions, hasMore]
                properties:
                  extractions:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExtractionJob"
                  hasMore:
                    type: boolean
                  nextCursor:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthenticated"
    post:
      operationId: createExtraction
      summary: Run extraction
      tags: [Extractions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toolType]
              properties:
                toolType:
                  $ref: "#/components/schemas/ExtractionToolType"
                targetTweetId:
                  type: string
                targetUsername:
                  type: string
                targetCommunityId:
                  type: string
                targetListId:
                  type: string
                targetSpaceId:
                  type: string
                searchQuery:
                  type: string
                exactPhrase:
                  type: string
                  description: Exact phrase to match (tweet_search_extractor)
                excludeWords:
                  type: string
                  description: Words to exclude from results (tweet_search_extractor)
                advancedQuery:
                  type: string
                  description: Raw advanced search query appended as-is (tweet_search_extractor)
      responses:
        "202":
          description: Extraction started
          content:
            application/json:
              schema:
                type: object
                required: [id, toolType, status]
                properties:
                  id:
                    type: string
                  toolType:
                    $ref: "#/components/schemas/ExtractionToolType"
                  status:
                    type: string
                    enum: [running]
        "400":
          $ref: "#/components/responses/InvalidInput"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "502":
          $ref: "#/components/responses/XApiError"

  /extractions/estimate:
    post:
      operationId: estimateExtraction
      summary: Estimate extraction cost
      tags: [Extractions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toolType]
              properties:
                toolType:
                  $ref: "#/components/schemas/ExtractionToolType"
                targetTweetId:
                  type: string
                targetUsername:
                  type: string
                targetCommunityId:
                  type: string
                targetListId:
                  type: string
                targetSpaceId:
                  type: string
                searchQuery:
                  type: string
                exactPhrase:
                  type: string
                  description: Exact phrase to match (tweet_search_extractor)
                excludeWords:
                  type: string
                  description: Words to exclude from results (tweet_search_extractor)
                advancedQuery:
                  type: string
