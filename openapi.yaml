  # ── Draws ────────────────────────────────────────────────
  /draws:
    get:
      operationId: listDraws
      summary: List draws
      tags: [Draws]
      security:
        - apiKey: []
        - oauthBearer: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/After'
      responses:
        '200':
          description: Draw list
          content:
            application/json:
              schema:
                type: object
                required: [draws, hasMore]
                properties:
                  draws:
                    type: array
                    items:
                      $ref: '#/components/schemas/DrawListItem'
                    example: []
                  hasMore:
                    type: boolean
                    example: false
                  nextCursor:
                    type: string
                    example: 'abc123'
              example:
                draws: []
                hasMore: false
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    post:
      operationId: createDraw
      summary: Run giveaway draw
      description:
        Runs a giveaway draw from a source tweet. The draw first checks the
        minimum credits needed to inspect the source tweet and at least one
        candidate. Remaining credits cap how many replies and retweeters can be
        inspected before filters and winner selection run.
      tags: [Draws]
      security:
        - apiKey: []
        - oauthBearer: []
      requestBody:
        required: true
        description:
          Tweet URL, winner count, and optional eligibility filters (retweet,
          follow, keywords, hashtags, account age).
        content:
          application/json:
            schema:
              type: object
              required: [tweetUrl]
              properties:
                tweetUrl:
                  type: string
                  format: uri
                  example: 'https://x.com/elonmusk/status/1234567890'
                winnerCount:
                  type: integer
                  default: 1
                  example: 3
                backupCount:
                  type: integer
                  example: 2
                uniqueAuthorsOnly:
                  type: boolean
                  example: true
                mustRetweet:
                  type: boolean
                  example: true
                mustFollowUsername:
                  type: string
                  example: elonmusk
                filterMinFollowers:
                  type: integer
                  example: 50
                filterAccountAgeDays:
                  type: integer
                  example: 30
                filterLanguage:
                  type: string
                  example: en
                requiredHashtags:
                  type: array
                  items:
                    type: string
                  example: ['#giveaway']
                requiredKeywords:
                  type: array
                  items:
                    type: string
                  example: ['entered']
                requiredMentions:
                  type: array
                  items:
                    type: string
                  example: ['@elonmusk']
            example:
              tweetUrl: 'https://x.com/elonmusk/status/1234567890'
              winnerCount: 3
              mustRetweet: true
      responses:
        '201':
          description: Draw completed
          content:
            application/json:
              schema:
                type: object
                required: [id, tweetId, totalEntries, validEntries, winners]
                properties:
                  id:
                    type: string
                    example: '42'
                  tweetId:
                    type: string
                    example: '1234567890'
                  totalEntries:
                    type: integer
                    description:
                      Candidate entries inspected for this draw after the
                      credit-derived cap. This may be lower than the source
                      tweet's full reply count.
                    example: 250
                  validEntries:
                    type: integer
                    description:
                      Entries from the inspected candidate set that passed all
                      filters. This is not necessarily every valid reply on the
                      source tweet when credits cap inspection.
                    example: 200
                  winners:
                    type: array
                    items:
                      $ref: '#/components/schemas/Winner'
                    example: []
              example:
                id: '42'
                tweetId: '1234567890'
                totalEntries: 250
                validEntries: 200
                winners: []
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          description:
            No subscription, inactive subscription, no credits, or insufficient
            credits. Draws can fail before execution when the minimum draw cost
            is not affordable, or after execution when the final computed cost
            cannot be deducted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'insufficient_credits'
                message: 'Insufficient credits'
        '502':
          $ref: '#/components/responses/XApiError'
        '424':
          $ref: '#/components/responses/XApiError'

