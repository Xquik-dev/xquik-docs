components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
    sessionCookie:
      type: apiKey
      in: cookie
      name: session_token
    oauthBearer:
      type: http
      scheme: bearer
      description: OAuth 2.1 access token

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID (stringified bigint)
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    After:
      name: after
      in: query
      schema:
        type: string
      description: Cursor for pagination
    StyleUsername:
      name: username
      in: path
      required: true
      schema:
        type: string
      description: X username of cached style

  responses:
    Success:
      description: Success
      content:
        application/json:
          schema:
            type: object
            required: [success]
            properties:
              success:
                type: boolean
                const: true
    NoContent:
      description: Deleted
    Unauthenticated:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InvalidInput:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PaymentRequired:
      description: Subscription or usage issue
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    XApiError:
      description: X API unavailable, unauthorized, or rate limited
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    WriteError:
      description: >
        Write operation failed. Possible error codes include x_write_failed,
        x_write_ambiguous, x_duplicate_action, x_daily_limit (429 — account
        reached daily posting limit, wait 24 hours), and x_write_unconfirmed
        (202 — action may have completed but could not be confirmed, verify
        before retrying).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
