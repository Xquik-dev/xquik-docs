url: https://docs.xquik.com
# content-start-position is omitted until the Mintlify HTML output exposes main
# content before the generated sidebar/navigation markup.
checks:
  - llms-txt-exists
  - llms-txt-valid
  - llms-txt-size
  - llms-txt-links-resolve
  - llms-txt-links-markdown
  - llms-txt-directive-html
  - llms-txt-directive-md
  - markdown-url-support
  - content-negotiation
  - rendering-strategy
  - page-size-html
  - page-size-markdown
  - tabbed-content-serialization
  - section-header-quality
  - markdown-code-fence-validity
  - http-status-codes
  - redirect-behavior
  - llms-txt-coverage
  - markdown-content-parity
  - cache-header-hygiene
  - auth-gate-detection
  - auth-alternative-access
options:
  maxLinksToTest: 50
  samplingStrategy: deterministic
